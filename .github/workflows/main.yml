name: Run Selenium Test

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          cache: maven
          distribution : "temurin"
      - uses: browser-actions/setup-chrome@latest
      - run: mvn clean test